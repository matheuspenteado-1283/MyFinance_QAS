<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir senha — MyFinance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --surface: #1e293b;
            --border: rgba(56, 189, 248, 0.2);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --error: #f87171;
            --success: #4ade80;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        h1 { font-size: 1.6rem; color: var(--primary); }
        p { font-size: 0.95rem; color: var(--muted); line-height: 1.5; }
        .field { display: flex; flex-direction: column; gap: 6px; position: relative; }
        label { font-size: 0.85rem; color: var(--muted); }
        input[type="password"], input[type="text"] {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 2.8rem 0.75rem 0.8rem;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            width: 100%;
        }
        input:focus { outline: none; border-color: var(--primary); }
        .toggle-btn {
            position: absolute;
            right: 0.75rem;
            bottom: 0.75rem;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
        }
        .toggle-btn:hover { color: var(--text); }
        .btn {
            background: var(--primary);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .btn:hover { filter: brightness(1.1); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .msg { font-size: 0.9rem; padding: 0.6rem 0.8rem; border-radius: 6px; display: none; }
        .msg.error { background: rgba(248,113,113,0.15); color: var(--error); }
        .msg.success { background: rgba(74,222,128,0.15); color: var(--success); }
        .back-link { font-size: 0.85rem; color: var(--muted); text-align: center; }
        .back-link a { color: var(--primary); text-decoration: none; }
        .invalid-state { text-align: center; }
        .invalid-state i { font-size: 3rem; color: var(--error); margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="card">
    <h1><i class="fa-solid fa-lock-open" style="margin-right:8px"></i>MyFinance</h1>

    {% if valid %}
    <p>Digite sua nova senha abaixo.</p>

    <form id="resetForm" onsubmit="handleReset(event)">
        <input type="hidden" id="token" value="{{ token }}">
        <div style="display:flex;flex-direction:column;gap:1rem">
            <div class="field">
                <label for="newPassword">Nova senha</label>
                <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
                <button type="button" class="toggle-btn" onclick="toggleVis('newPassword','icon1')" tabindex="-1">
                    <i id="icon1" class="fa-solid fa-eye"></i>
                </button>
            </div>
            <div class="field">
                <label for="confirmPassword">Confirmar senha</label>
                <input type="password" id="confirmPassword" placeholder="Repita a senha" required minlength="6">
                <button type="button" class="toggle-btn" onclick="toggleVis('confirmPassword','icon2')" tabindex="-1">
                    <i id="icon2" class="fa-solid fa-eye"></i>
                </button>
            </div>
            <div class="msg error" id="errMsg"></div>
            <div class="msg success" id="okMsg"></div>
            <button type="submit" class="btn" id="submitBtn">
                <i class="fa-solid fa-check"></i> Salvar nova senha
            </button>
        </div>
    </form>
    {% else %}
    <div class="invalid-state">
        <i class="fa-solid fa-circle-xmark"></i>
        <p>Este link é inválido ou já expirou.</p>
        <p style="margin-top:0.5rem">Solicite um novo link na tela de login.</p>
    </div>
    {% endif %}

    <div class="back-link">
        <a href="/"><i class="fa-solid fa-arrow-left" style="margin-right:4px"></i>Voltar ao login</a>
    </div>
</div>

<script>
    function toggleVis(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    async function handleReset(e) {
        e.preventDefault();
        const errMsg = document.getElementById('errMsg');
        const okMsg = document.getElementById('okMsg');
        const btn = document.getElementById('submitBtn');
        errMsg.style.display = 'none';
        okMsg.style.display = 'none';

        const pwd = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        if (pwd !== confirm) {
            errMsg.textContent = 'As senhas não coincidem.';
            errMsg.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvando...';

        try {
            const res = await fetch('/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: document.getElementById('token').value, password: pwd })
            });
            const data = await res.json();
            if (res.ok) {
                okMsg.textContent = 'Senha redefinida com sucesso! Redirecionando...';
                okMsg.style.display = 'block';
                btn.style.display = 'none';
                setTimeout(() => { window.location.href = '/'; }, 2500);
            } else {
                errMsg.textContent = data.error || 'Erro ao redefinir senha.';
                errMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Salvar nova senha';
            }
        } catch {
            errMsg.textContent = 'Erro de conexão. Tente novamente.';
            errMsg.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Salvar nova senha';
        }
    }
</script>
</body>
</html>
